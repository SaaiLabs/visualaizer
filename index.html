<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIA Traffic Inspection Simulator (Responsive)</title>
<style>
  * { box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #0f172a; 
    margin: 0; 
    padding: 10px; 
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  
  .sim-container { 
    background: #1e293b; 
    border: 1px solid #334155; 
    border-radius: 12px; 
    padding: 20px; 
    width: 100%;
    max-width: 900px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
  }
  
  /* Header & Buttons */
  .sim-header { 
    display: flex; 
    flex-direction: column;
    margin-bottom: 20px; 
    gap: 15px;
  }
  .sim-title { margin: 0; font-size: 1.3em; font-weight: bold; color: #f8fafc; text-align: center;}
  
  .btn-group { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    justify-content: center;
  }
  .btn { 
    flex: 1 1 auto;
    min-width: 120px;
    background: #38bdf8; color: #0f172a; border: none; padding: 10px; 
    border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s;
    font-size: 0.9em;
  }
  .btn:active { transform: scale(0.98); }
  .btn-danger { background: #ef4444; color: white; }
  .btn-warning { background: #f59e0b; color: #0f172a; }
  .btn-secondary { background: #475569; color: white; }
  
  /* Pipeline Layout */
  .pipeline-wrapper {
    position: relative;
    background: #0f172a;
    border-radius: 8px;
    border: 1px solid #334155;
    padding: 20px;
    margin-bottom: 20px;
    min-height: 250px;
  }

  .status-text { 
    text-align: center;
    font-weight: bold; color: #38bdf8; 
    background: rgba(15, 23, 42, 0.9);
    padding: 8px; border-radius: 4px; font-size: 0.9em;
    margin-bottom: 20px;
    min-height: 36px;
  }

  .pipeline { 
    display: flex; 
    flex-direction: column; /* Mobile first: Vertical Stack */
    align-items: center; 
    position: relative; 
    gap: 30px;
  }

  .node { 
    z-index: 2; background: #334155; padding: 12px; 
    border-radius: 8px; text-align: center; border: 2px solid #475569; 
    width: 100%; max-width: 200px;
    font-weight: 600; font-size: 0.9em; color: #f8fafc; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  .node-zia { border-color: #38bdf8; background: #0c4a6e; }
  
  /* Packet Animation Elements */
  .path-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
  }

  .packet { 
    position: absolute; width: 20px; height: 20px; background: #22c55e; 
    border-radius: 50%; opacity: 0; z-index: 10;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
    transition: top 0.8s ease, left 0.8s ease, transform 0.3s, background 0.3s;
    /* Center it initially */
    left: 50%;
    transform: translate(-50%, -50%);
  }
  
  /* Connecting Lines (Vertical for mobile) */
  .line-v {
    position: absolute;
    width: 2px; background: #334155;
    left: 50%; transform: translateX(-50%);
    z-index: 0;
  }
  .line-top { top: 40px; height: 60px; }
  .line-bottom { top: 140px; height: 60px; }
  
  /* Desktop Layout Overrides */
  @media (min-width: 650px) {
    .sim-header { flex-direction: row; justify-content: space-between; }
    .sim-title { text-align: left; }
    .btn-group { justify-content: flex-end; }
    .btn { min-width: auto; }
    
    .pipeline { 
      flex-direction: row; 
      justify-content: space-between;
      height: 150px;
      gap: 0;
    }
    .node { width: 140px; }
    
    /* Hide vertical lines, show horizontal */
    .line-v { display: none; }
    
    .line-h {
        position: absolute; top: 50%; height: 2px; background: #334155; z-index: 0; width: calc(50% - 100px);
    }
    .line-left { left: 100px; }
    .line-right { right: 100px; }
  }

  /* Log Panel */
  .log-panel { 
    background: #020617; color: #10b981; 
    font-family: 'Courier New', Courier, monospace; padding: 12px; 
    border-radius: 6px; height: 150px; overflow-y: auto; 
    border: 1px solid #1e293b; font-size: 0.8em;
  }
  .log-entry { margin-bottom: 6px; border-bottom: 1px dashed #1e293b; padding-bottom: 6px; word-break: break-all;}
  .log-error { color: #ef4444; }
  .log-warn { color: #f59e0b; }
  .log-system { color: #64748b; }
</style>
</head>
<body>
  <div class="sim-container">
    <div class="sim-header">
      <div class="sim-title">Interactive ZIA Simulator</div>
      <div class="btn-group">
        <button class="btn" onclick="simulate('safe')">Safe SaaS</button>
        <button class="btn btn-danger" onclick="simulate('malicious')">malicious</button>
        <button class="btn btn-warning" onclick="simulate('shadow')">Shadow IT</button>
        <button class="btn btn-secondary" onclick="resetSim()">Reset</button>
      </div>
    </div>
    
    <div class="pipeline-wrapper">
      <div class="status-text" id="statusText">System Idle. Awaiting Traffic...</div>
      
      <div class="pipeline" id="pipeline">
        <!-- Connecting Lines -->
        <div class="line-v line-top"></div>
        <div class="line-v line-bottom"></div>
        <div class="line-h line-left" style="display:none;"></div>
        <div class="line-h line-right" style="display:none;"></div>

        <div class="node" id="nodeLaptop">Employee<br>Laptop<br><small style="color:#94a3b8; font-weight:normal;">Zscaler Client</small></div>
        <div class="node node-zia" id="nodeZIA">ZIA Security<br>Cloud (ZEN)<br><small style="color:#7dd3fc; font-weight:normal;">Policy Engine</small></div>
        <div class="node" id="nodeDest">Internet /<br>Destinations<br><small style="color:#94a3b8; font-weight:normal;">SaaS / Web</small></div>
        
        <div class="packet" id="packet"></div>
      </div>
    </div>

    <div class="log-panel" id="logPanel">
      <div class="log-entry log-system" id="initLog">> SIEM/NSS Log Stream Initialized...</div>
    </div>
  </div>

<script>
  let isSimulating = false;
  let simTimeout1, simTimeout2, simTimeout3;

  // Helper to determine if we are on desktop layout based on CSS media query
  function isDesktop() {
    return window.innerWidth >= 650;
  }

  // Inject dynamic horizontal lines for desktop via JS so they don't break mobile CSS
  window.addEventListener('resize', setupLines);
  document.addEventListener('DOMContentLoaded', setupLines);

  function setupLines() {
    const lines = document.querySelectorAll('.line-h');
    if(isDesktop()) {
        lines.forEach(l => l.style.display = 'block');
    } else {
        lines.forEach(l => l.style.display = 'none');
    }
  }

  function log(msg, type='info') {
    const panel = document.getElementById('logPanel');
    const entry = document.createElement('div');
    const timestamp = new Date().toISOString().split('T')[1].slice(0,-1);
    
    let colorClass = '';
    if(type === 'error') colorClass = 'log-error';
    if(type === 'warn') colorClass = 'log-warn';
    if(type === 'system') colorClass = 'log-system';
    
    entry.className = 'log-entry ' + colorClass;
    entry.textContent = `[${timestamp}] ${msg}`;
    panel.prepend(entry);
  }

  function getCenterCoords(elementId) {
    const el = document.getElementById(elementId);
    const parent = document.getElementById('pipeline');
    
    const elRect = el.getBoundingClientRect();
    const parentRect = parent.getBoundingClientRect();
    
    return {
        top: (elRect.top - parentRect.top) + (elRect.height / 2),
        left: (elRect.left - parentRect.left) + (elRect.width / 2)
    };
  }

  function resetSim() {
    clearTimeout(simTimeout1);
    clearTimeout(simTimeout2);
    clearTimeout(simTimeout3);
    isSimulating = false;

    const packet = document.getElementById('packet');
    packet.style.transition = 'none';
    packet.style.opacity = '0';
    
    const status = document.getElementById('statusText');
    status.textContent = 'System Idle. Awaiting Traffic...';
    
    const panel = document.getElementById('logPanel');
    panel.innerHTML = '<div class="log-entry log-system">> SIEM/NSS Log Stream Initialized...</div>';
  }

  function simulate(scenario) {
    if (isSimulating) return;
    isSimulating = true;
    
    const packet = document.getElementById('packet');
    const status = document.getElementById('statusText');
    
    // Calculate exact positions based on current layout (Mobile or Desktop)
    const posLaptop = getCenterCoords('nodeLaptop');
    const posZIA = getCenterCoords('nodeZIA');
    const posDest = getCenterCoords('nodeDest');
    
    // Reset packet to Laptop position
    packet.style.transition = 'none';
    packet.style.top = posLaptop.top + 'px';
    packet.style.left = posLaptop.left + 'px';
    packet.style.transform = 'translate(-50%, -50%) scale(1)';
    packet.style.opacity = '1';
    packet.style.background = '#22c55e';
    packet.style.boxShadow = '0 0 10px rgba(34, 197, 94, 0.8)';
    status.textContent = 'Agent Intercept: Forwarding to ZEN...';
    
    log(`Initiating flow: ${scenario.toUpperCase()} payload...`, 'system');
    
    // Force reflow
    void packet.offsetWidth;
    
    // Animate to ZIA
    packet.style.transition = 'top 0.8s ease, left 0.8s ease, transform 0.3s, background 0.3s';
    
    simTimeout1 = setTimeout(() => {
      packet.style.top = posZIA.top + 'px';
      packet.style.left = posZIA.left + 'px';
      
      simTimeout2 = setTimeout(() => {
        status.textContent = 'ZEN: Inspecting Payload...';
        packet.style.background = '#38bdf8';
        packet.style.boxShadow = '0 0 15px rgba(56, 189, 248, 0.9)';
        
        simTimeout3 = setTimeout(() => {
          if(scenario === 'safe') {
            status.textContent = 'Policy Allowed. Forwarding.';
            packet.style.top = posDest.top + 'px';
            packet.style.left = posDest.left + 'px';
            packet.style.background = '#22c55e';
            log('ALLOW - 200 OK (Verified SaaS Context)', 'info');
            
            setTimeout(() => {
              status.textContent = 'Transaction Complete.';
              packet.style.opacity = '0';
              isSimulating = false;
            }, 800);
          } 
          else if (scenario === 'malicious') {
            status.textContent = 'ATP ALERT: malicious Match!';
            packet.style.background = '#ef4444';
            packet.style.boxShadow = '0 0 20px rgba(239, 68, 68, 1)';
            packet.style.transform = 'translate(-50%, -50%) scale(2)';
            packet.style.opacity = '0';
            log('BLOCK - ATP: TCP Reset (malicious Hash Match)', 'error');
            isSimulating = false;
          }
          else if (scenario === 'shadow') {
            status.textContent = 'CASB ALERT: Policy Violation.';
            packet.style.background = '#f59e0b';
            packet.style.boxShadow = '0 0 20px rgba(245, 158, 11, 1)';
            packet.style.transform = 'translate(-50%, -50%) scale(0)';
            packet.style.opacity = '0';
            log('BLOCK - CASB: 403 Forbidden (Shadow IT)', 'warn');
            isSimulating = false;
          }
        }, 1000);
      }, 800);
    }, 100);
  }
</script>
</body>
</html>
